  <div id="__bundler_loading">Unpacking...</div>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

: 999px; }\n.input { padding-inline: 14px; }\n\n<\u002Fstyle>\n  <script src=\"54c26933-55fc-4351-a743-5251b66128da\"><\u002Fscript>\n  <style>\n    @keyframes pop { 0%{transform:scale(.97);opacity:0} 100%{transform:scale(1);opacity:1} }\n    @keyframes slideup { 0%{transform:translateY(8px);opacity:0} 100%{transform:translateY(0);opacity:1} }\n    @keyframes bubblein { 0%{transform:translateY(6px) scale(.98);opacity:0} 100%{transform:translateY(0) scale(1);opacity:1} }\n    @keyframes bob { 0%,100%{transform:translate(-50%,-50%) translateY(0)} 50%{transform:translate(-50%,-50%) translateY(-5px)} }\n    @keyframes graze { 0%,100%{transform:translate(-50%,-50%) rotate(0deg)} 50%{transform:translate(-50%,-50%) rotate(-7deg)} }\n    @keyframes wander { 0%{transform:translateX(0) scaleX(1)} 24%{transform:translateX(46px) scaleX(1)} 26%{transform:translateX(46px) scaleX(-1)} 50%{transform:translateX(0) scaleX(-1)} 74%{transform:translateX(-46px) scaleX(-1)} 76%{transform:translateX(-46px) scaleX(1)} 100%{transform:translateX(0) scaleX(1)} }\n    @keyframes swayTower { 0%,100%{transform:translateX(-50%) rotate(-1deg)} 50%{transform:translateX(-50%) rotate(1deg)} }\n    @keyframes flamefx { 0%,100%{transform:scaleY(1) scaleX(1)} 50%{transform:scaleY(1.18) scaleX(.9)} }\n    @keyframes smoke { 0%{transform:translateY(0);opacity:.6} 100%{transform:translateY(-26px);opacity:0} }\n    @keyframes bornpop { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.25)} 100%{transform:scale(1);opacity:1} }\n    a{color:var(--color-accent)} a:hover{color:var(--color-accent-600)}\n    .rv-scroll::-webkit-scrollbar{width:8px} .rv-scroll::-webkit-scrollbar-thumb{background:var(--color-neutral-300);border-radius:99px}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:var(--color-neutral-900);font-family:var(--font-body);color:var(--color-text);padding:18px\">\n  <div style=\"max-width:980px;margin:0 auto\">\n\n    <!-- ===================== INICIO ===================== -->\n    <sc-if value=\"{{ isInicio }}\" hint-placeholder-val=\"{{ true }}\">\n      <div class=\"card elev-md\" style=\"padding:30px 30px 34px;animation:pop .3s ease\">\n        <div style=\"text-align:center\">\n          <h1 style=\"font-family:var(--font-heading);font-size:38px;margin:0;line-height:1.05\">Riverside en equilibrio<\u002Fh1>\n          <div style=\"color:var(--color-accent-2-700);font-weight:700;letter-spacing:.05em;font-size:13px;margin-top:6px\">UN JUEGO DE AGUA · SPN · ACENTUACIÓN<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"text-align:center;font-size:15.5px;color:var(--color-neutral-800);line-height:1.6;max-width:60ch;margin:16px auto 0\">\n          Eres <strong>un animal que estudia en UCR<\u002Fstrong>. Recorre la ciudad, entra en cada lugar y ayuda en español: escribe la palabra con su <strong>tilde<\u002Fstrong> correcta y di <strong>por qué<\u002Fstrong>. Cada acierto <span style=\"color:var(--color-accent-2-700);font-weight:700\">ahorra agua<\u002Fspan> y mantiene la ciudad viva; cada fallo la <span style=\"color:var(--color-accent-700);font-weight:700\">seca<\u002Fspan>… pero siempre puedes recuperarla.\n        <\u002Fp>\n\n        <div style=\"text-align:center;color:var(--color-accent-2-700);font-weight:700;letter-spacing:.06em;font-size:12px;margin:24px 0 12px\">ELIGE TU ANIMAL<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center\">\n          <sc-for list=\"{{ animalChoices }}\" as=\"a\" hint-placeholder-count=\"8\">\n            <button type=\"button\" sc-camel-on-click=\"{{ a.onClick }}\" style=\"{{ a.style }}\">{{ a.emoji }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div class=\"card\" style=\"margin:16px auto 0;max-width:560px;padding:14px 16px;display:flex;gap:13px;align-items:flex-start;background:var(--color-neutral-100)\">\n          <div style=\"font-size:34px;line-height:1;flex:none\">{{ animalEmoji }}<\u002Fdiv>\n          <div>\n            <div style=\"font-family:var(--font-heading);font-size:18px\">{{ animalName }} <span style=\"font-size:12px;font-weight:400;color:var(--color-neutral-600);font-family:var(--font-body)\">· {{ animalLatin }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:13.5px;color:var(--color-neutral-700);line-height:1.5;margin-top:2px\">{{ animalNote }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px\">\n          <div class=\"tag tag-accent-2\" style=\"font-size:12.5px\">🎯 Meta: rescata Riverside — {{ metaGal }} gal · {{ metaAciertos }} aciertos<\u002Fdiv>\n          <button type=\"button\" class=\"tag tag-outline\" style=\"cursor:pointer;font-size:12.5px\" sc-camel-on-click=\"{{ openReglas }}\">📖 Reglas de acentuación<\u002Fbutton>\n          <button type=\"button\" class=\"tag tag-neutral\" style=\"cursor:pointer;font-size:12.5px\" sc-camel-on-click=\"{{ openHuella }}\">🌍 Huella: {{ co2Net }} g CO₂e · 💧 {{ waterNet }} L<\u002Fbutton>\n        <\u002Fdiv>\n\n        <button type=\"button\" class=\"btn btn-primary btn-block\" style=\"height:54px;font-size:18px;margin-top:22px\" sc-camel-on-click=\"{{ play }}\">¡A jugar! →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== MAPA ===================== -->\n    <sc-if value=\"{{ isMapa }}\">\n      <div>\n        <!-- HUD -->\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:14px\">\n          <div style=\"margin-right:auto\">\n            <div style=\"font-family:var(--font-heading);font-size:22px;color:var(--color-bg);line-height:1\">Riverside en equilibrio<\u002Fdiv>\n            <div style=\"font-size:12px;color:var(--color-neutral-400)\">UCR · SPN · ACENTOS {{ animalEmoji }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:var(--color-accent-2-100);border:1.5px solid var(--color-accent-2);border-radius:16px;padding:9px 15px;min-width:118px\">\n            <div style=\"font-size:10px;letter-spacing:.08em;color:var(--color-accent-2-800);font-weight:700\">AGUA AHORRADA<\u002Fdiv>\n            <div style=\"font-family:var(--font-heading);font-size:24px;color:var(--color-accent-2-800);line-height:1.05\">{{ saved }} <span style=\"font-size:12px\">gal<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:var(--color-accent-100);border:1.5px solid var(--color-accent);border-radius:16px;padding:9px 15px;min-width:118px\">\n            <div style=\"font-size:10px;letter-spacing:.08em;color:var(--color-accent-700);font-weight:700\">AGUA GASTADA<\u002Fdiv>\n            <div style=\"font-family:var(--font-heading);font-size:24px;color:var(--color-accent-700);line-height:1.05\">{{ spent }} <span style=\"font-size:12px\">gal<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:var(--color-neutral-800);border-radius:16px;padding:9px 15px\">\n            <div style=\"font-size:10px;letter-spacing:.08em;color:var(--color-neutral-400);font-weight:700\">PARA LA META<\u002Fdiv>\n            <div style=\"font-size:13px;color:var(--color-bg);font-weight:600\">{{ savedLeft }} gal · {{ aciertosLeft }} aciertos<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:var(--color-neutral-800);border-radius:16px;padding:9px 15px;text-align:center\">\n            <div style=\"font-size:10px;letter-spacing:.08em;color:var(--color-neutral-400);font-weight:700\">CIUDAD<\u002Fdiv>\n            <div style=\"font-size:14px;color:{{ cityColor }};font-weight:700\">{{ cityEmoji }} {{ cityLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <button type=\"button\" class=\"btn btn-ghost\" style=\"height:40px\" sc-camel-on-click=\"{{ openHuella }}\" title=\"Huella de crear el juego\">🌍 {{ co2Net }} g · 💧 {{ waterNet }} L<\u002Fbutton>\n          <button type=\"button\" class=\"btn btn-ghost\" style=\"height:40px\" sc-camel-on-click=\"{{ toggleBackpack }}\">🎒 Mochila · {{ backpackCount }}<\u002Fbutton>\n          <button type=\"button\" class=\"btn btn-secondary\" style=\"height:40px\" sc-camel-on-click=\"{{ reiniciar }}\">↺ Reiniciar<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- MAP -->\n        <div style=\"position:relative;width:100%;aspect-ratio:2/1;min-height:360px;border-radius:24px;overflow:hidden;background:{{ groundBg }};box-shadow:var(--shadow-lg);transition:background .6s ease\">\n          <!-- sky -->\n          <div style=\"position:absolute;left:0;right:0;top:0;height:46%;background:{{ skyBg }};transition:background .6s\"><\u002Fdiv>\n          <!-- far mountains (Sierra / San Bernardino) -->\n          <div style=\"position:absolute;left:-2%;right:-2%;top:8%;height:32%;background:{{ mtnFar }};transition:background .6s;clip-path:polygon(0% 80%,8% 54%,17% 70%,27% 40%,37% 63%,47% 33%,57% 58%,67% 42%,77% 62%,87% 37%,95% 60%,100% 48%,100% 100%,0% 100%)\"><\u002Fdiv>\n          <!-- near mountains (Box Springs) with the block C -->\n          <div style=\"position:absolute;left:-2%;right:-2%;top:20%;height:28%;background:{{ mtnNear }};transition:background .6s;clip-path:polygon(0% 72%,12% 46%,22% 66%,33% 38%,44% 62%,54% 44%,63% 66%,73% 40%,84% 64%,93% 46%,100% 64%,100% 100%,0% 100%)\"><\u002Fdiv>\n          <div style=\"position:absolute;left:30%;top:22%;font-family:var(--font-heading);font-size:24px;color:rgba(255,255,255,.6);letter-spacing:-1px\">C<\u002Fdiv>\n\n          <!-- cerro wildfire (3+ errores) -->\n          <sc-if value=\"{{ cerroFire }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;left:62%;top:26%;z-index:5\">\n              <div style=\"position:absolute;left:-6px;top:-30px;width:28px;height:28px;border-radius:50%;background:rgba(90,80,74,.5);filter:blur(5px);animation:smoke 2.6s linear infinite\"><\u002Fdiv>\n              <div style=\"font-size:30px;transform-origin:bottom center;animation:flamefx .5s ease-in-out infinite\">🔥<\u002Fdiv>\n              <div style=\"position:absolute;left:20px;top:4px;font-size:22px;transform-origin:bottom center;animation:flamefx .6s ease-in-out infinite;animation-delay:.2s\">🔥<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- cracked earth when dry -->\n          <div style=\"position:absolute;inset:0;opacity:{{ crackOpacity }};background-image:radial-gradient(circle at 20% 82%,rgba(90,64,32,.5) 0 2px,transparent 3px),radial-gradient(circle at 70% 90%,rgba(90,64,32,.4) 0 2px,transparent 3px);background-size:60px 60px,90px 90px;pointer-events:none;transition:opacity .6s\"><\u002Fdiv>\n\n          <!-- roads -->\n          <div style=\"position:absolute;left:0;right:0;top:62%;height:7%;background:rgba(60,54,48,.30)\"><\u002Fdiv>\n          <div style=\"position:absolute;top:46%;bottom:0;left:44.5%;width:5%;background:rgba(60,54,48,.30)\"><\u002Fdiv>\n          <!-- decor -->\n          <sc-for list=\"{{ decor }}\" as=\"d\" hint-placeholder-count=\"5\">\n            <div style=\"{{ d.style }}\">{{ d.emoji }}<\u002Fdiv>\n          <\u002Fsc-for>\n\n          <!-- dynamic burros: nacen al acertar, mueren al errar -->\n          <sc-for list=\"{{ burros }}\" as=\"d\" hint-placeholder-count=\"3\">\n            <div style=\"position:absolute;left:{{ d.left }};top:{{ d.top }};z-index:6;animation:wander {{ d.dur }}s ease-in-out infinite;animation-delay:{{ d.delay }}s\">\n              <div style=\"font-size:30px;filter:{{ donkeyFilter }};opacity:{{ donkeyOpacity }};transition:filter .6s,opacity .6s;transform-origin:bottom center;animation:{{ d.anim }}\">🫏<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <!-- burro caído (0 burros por muchos errores) -->\n          <sc-if value=\"{{ deadBurro }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;left:52%;top:82%;z-index:6;font-size:30px;filter:grayscale(1);transform:scaleY(-1)\">🫏<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- locations -->\n          <sc-for list=\"{{ locList }}\" as=\"l\" hint-placeholder-count=\"8\">\n            <button type=\"button\" sc-camel-on-click=\"{{ l.onClick }}\" style=\"{{ l.style }}\">\n              <div style=\"{{ l.iconStyle }}\">{{ l.emoji }}<sc-if value=\"{{ l.done }}\"><span style=\"position:absolute;right:-5px;top:-5px;width:20px;height:20px;border-radius:50%;background:var(--color-accent-2);color:#fff;font-size:12px;display:grid;place-items:center;border:2px solid #fff\">✓<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n              <span style=\"font-size:11.5px;font-weight:700;color:#2c2622;background:rgba(255,255,255,.86);padding:2px 8px;border-radius:99px;white-space:nowrap\">{{ l.name }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n\n          <!-- Bell Tower over the Biblioteca (interactive location) -->\n          <button type=\"button\" sc-camel-on-click=\"{{ towerClick }}\" style=\"position:absolute;left:46%;top:60%;transform:translate(-50%,-100%);z-index:7;display:flex;flex-direction:column;align-items:center;background:none;border:none;cursor:pointer;padding:0;filter:{{ towerFilter }};transition:filter .6s ease\">\n            <sc-if value=\"{{ towerFire }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:absolute;top:-22px;left:50%;transform:translateX(-50%);z-index:2;font-size:26px;animation:flamefx .5s ease-in-out infinite\">🔥<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"width:38px;height:96px;background:linear-gradient(90deg,#efe7d4,#d9cdb2);border-radius:8px 8px 3px 3px;box-shadow:var(--shadow-md);position:relative;animation:swayTower 5s ease-in-out infinite;transform-origin:bottom center\">\n              <div style=\"position:absolute;top:9px;left:50%;transform:translateX(-50%);width:18px;height:22px;background:#7a8a5e;border-radius:99px 99px 0 0\"><\u002Fdiv>\n              <div style=\"position:absolute;top:38px;left:7px;right:7px;height:5px;background:rgba(122,138,94,.5);border-radius:2px\"><\u002Fdiv>\n              <div style=\"position:absolute;top:50px;left:7px;right:7px;height:5px;background:rgba(122,138,94,.5);border-radius:2px\"><\u002Fdiv>\n              <div style=\"position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:12px\">📚<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:11px;font-weight:800;color:#2c2622;background:rgba(255,255,255,.86);padding:1px 8px;border-radius:99px;margin-top:3px;white-space:nowrap\">🔔 Bell Tower · Biblioteca<sc-if value=\"{{ ucrDone }}\"> ✓<\u002Fsc-if><\u002Fdiv>\n          <\u002Fbutton>\n\n          <!-- avatar (you) walking around -->\n          <div style=\"position:absolute;left:{{ avatarLeft }};top:{{ avatarTop }};z-index:20;transition:left .7s cubic-bezier(.4,.1,.3,1),top .7s cubic-bezier(.4,.1,.3,1);pointer-events:none\">\n            <div style=\"font-size:44px;transform:translate(-50%,-50%);animation:bob 1.1s ease-in-out infinite;filter:drop-shadow(0 6px 5px rgba(0,0,0,.28))\">{{ animalEmoji }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- fire alert / extinguish -->\n          <sc-if value=\"{{ anyFire }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;left:50%;bottom:12px;transform:translateX(-50%);z-index:22;display:flex;align-items:center;gap:10px;background:rgba(43,36,25,.9);color:#fff;padding:9px 14px;border-radius:999px;animation:pop .3s ease\">\n              <span style=\"font-size:13px;font-weight:700\">🔥 {{ fireMsg }}<\u002Fspan>\n              <button type=\"button\" sc-camel-on-click=\"{{ apagarFuego }}\" style=\"border:none;cursor:pointer;background:var(--color-accent-2);color:#fff;font-weight:700;font-size:12.5px;padding:6px 12px;border-radius:999px\" disabled=\"{{ noBarril }}\">🪣 Apagar ({{ barrilCount }})<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"font-size:12px;color:var(--color-neutral-400);text-align:center;margin-top:8px\">{{ statusMsg }}<\u002Fdiv>\n\n        <sc-if value=\"{{ metaDone }}\">\n          <div class=\"card\" style=\"margin-top:14px;padding:14px 18px;background:var(--color-accent-2-100);border:1.5px solid var(--color-accent-2);text-align:center;color:var(--color-accent-2-800);font-weight:700;animation:pop .3s ease\">\n            🎉 ¡Rescataste Riverside! {{ saved }} gal ahorrados y {{ aciertos }} aciertos. Sigue jugando para dejarla aún más verde.\n          <\u002Fdiv>\n          <div class=\"card elev-md\" style=\"margin-top:12px;padding:18px 20px;animation:pop .3s ease\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:4px\">\n              <span style=\"font-size:24px\">🎉<\u002Fspan>\n              <div>\n                <div style=\"font-family:var(--font-heading);font-size:20px;line-height:1.1;color:var(--color-text)\">Crédito extra desbloqueado<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:var(--color-neutral-600)\">Alcanzaste la meta: {{ metaGal }} gal y {{ metaAciertos }} aciertos.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"font-size:14px;color:var(--color-neutral-800);line-height:1.5;margin:8px 0 0\">Escribe tu nombre y envía tu resultado a la profesora para pedir el crédito extra.<\u002Fp>\n            <div class=\"field\" style=\"margin-top:12px\">\n              <label>Nombre del estudiante<\u002Flabel>\n              <input class=\"input\" value=\"{{ studentName }}\" sc-camel-on-input=\"{{ onNameInput }}\" placeholder=\"Nombre y apellidos\" spellcheck=\"false\" sc-camel-auto-complete=\"name\">\n            <\u002Fdiv>\n            <a class=\"btn btn-primary btn-block\" style=\"height:50px;font-size:16px;margin-top:12px;{{ sendStyle }}\" href=\"{{ mailtoHref }}\" sc-camel-on-click=\"{{ onSendClick }}\">✉️ Enviar mi resultado a la profesora<\u002Fa>\n            <div style=\"font-size:12px;color:var(--color-neutral-600);text-align:center;margin-top:8px\">Se abrirá tu correo con nombre, agua ahorrada, aciertos y fecha ya escritos.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== MOCHILA ===================== -->\n    <sc-if value=\"{{ showBackpack }}\">\n      <div class=\"dialog-backdrop\" sc-camel-on-click=\"{{ toggleBackpack }}\" style=\"z-index:65;justify-content:flex-end\">\n        <div style=\"width:340px;max-width:90vw;height:100%;background:var(--color-bg);box-shadow:-10px 0 30px rgba(0,0,0,.3);padding:26px 22px;overflow-y:auto\" sc-camel-on-click=\"{{ stop }}\">\n          <div style=\"font-family:var(--font-heading);font-size:22px;color:var(--color-text)\">🎒 Tu mochila<\u002Fdiv>\n          <p style=\"font-size:13px;color:var(--color-neutral-600);margin:4px 0 16px\">Ganas un 🪣 barril de agua cada vez que completas un lugar. Úsalos para apagar los incendios que provocan los errores.<\u002Fp>\n          <sc-if value=\"{{ backpackEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:13.5px;color:var(--color-neutral-500);padding:20px 0;text-align:center\">Vacía por ahora. Completa un lugar para conseguir objetos.<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-for list=\"{{ bagItems }}\" as=\"it\" hint-placeholder-count=\"2\">\n            <div class=\"card\" style=\"display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:10px;background:var(--color-surface)\">\n              <div style=\"font-size:30px;flex:none\">{{ it.emoji }}<\u002Fdiv>\n              <div style=\"flex:1\"><div style=\"font-weight:700;font-size:14px\">{{ it.name }} × {{ it.count }}<\u002Fdiv><div style=\"font-size:12px;color:var(--color-neutral-600)\">{{ it.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== MODAL LUGAR ===================== -->\n    <sc-if value=\"{{ open }}\">\n      <div style=\"position:fixed;inset:0;background:rgba(24,22,20,.55);display:flex;align-items:center;justify-content:center;padding:16px;z-index:60\" sc-camel-on-click=\"{{ closeModal }}\">\n        <div class=\"card elev-lg\" style=\"width:min(640px,100%);max-height:92vh;display:flex;flex-direction:column;padding:0;overflow:hidden;animation:pop .25s ease\" sc-camel-on-click=\"{{ stop }}\">\n          <!-- header -->\n          <div style=\"background:var(--color-accent-2);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:13px\">\n            <div style=\"width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;font-size:26px;flex:none\">{{ animalEmoji }}<\u002Fdiv>\n            <div style=\"margin-right:auto\">\n              <div style=\"font-family:var(--font-heading);font-size:20px;line-height:1.05\">{{ locName }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;opacity:.9\">{{ locChar }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(255,255,255,.2);border-radius:99px;padding:6px 13px;font-size:11.5px;font-weight:700;text-align:right;line-height:1.2\">{{ locCap }}<br>ACENTUACIÓN<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- body -->\n          <div class=\"rv-scroll\" style=\"padding:18px 20px;overflow:auto\">\n\n            <sc-if value=\"{{ isScenario }}\">\n              <div style=\"animation:bubblein .25s ease\">\n                <div style=\"display:flex;gap:10px;align-items:flex-start\">\n                  <span style=\"font-size:26px;flex:none\">{{ animalEmoji }}<\u002Fspan>\n                  <div style=\"background:var(--color-neutral-100);border-radius:14px;padding:11px 14px;font-size:15px;line-height:1.55;color:var(--color-text)\">{{ locScenario }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ isPlay }}\">\n              <div>\n                <!-- dialogue -->\n                <div style=\"display:flex;flex-direction:column;gap:9px\">\n                  <sc-for list=\"{{ dialogLines }}\" as=\"d\" hint-placeholder-count=\"2\">\n                    <div style=\"{{ d.rowStyle }}\">\n                      <span style=\"{{ d.whoStyle }}\">{{ d.who }}<\u002Fspan>\n                      <div style=\"{{ d.bubbleStyle }}\">{{ d.pre }}<sc-if value=\"{{ d.hasToken }}\"><span style=\"{{ d.tokenStyle }}\">{{ d.token }}<\u002Fspan><\u002Fsc-if>{{ d.post }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <sc-if value=\"{{ isRevealed }}\">\n                  <div style=\"display:flex;justify-content:center;align-items:flex-end;gap:5px;flex-wrap:wrap;padding:14px 0 2px;animation:pop .2s ease\">\n                    <sc-for list=\"{{ silabas }}\" as=\"s\" hint-placeholder-count=\"3\">\n                      <span style=\"{{ s.style }}\">{{ s.text }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- input -->\n                <div class=\"field\" style=\"margin-top:16px\">\n                  <label>✍️ Escribe la palabra completa (con tilde si la necesita)<\u002Flabel>\n                  <input class=\"input\" style=\"height:48px;font-size:19px;text-align:center;font-family:var(--font-heading);letter-spacing:.02em\" value=\"{{ currentInput }}\" sc-camel-on-input=\"{{ onWordInput }}\" sc-camel-on-key-down=\"{{ onKey }}\" disabled=\"{{ isRevealed }}\" placeholder=\"…\" spellcheck=\"false\" sc-camel-auto-complete=\"off\" sc-camel-auto-capitalize=\"off\">\n                <\u002Fdiv>\n\n                <!-- rules -->\n                <div style=\"margin:16px 0 9px;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--color-neutral-600)\">¿Por qué? Elige la regla<\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px\">\n                  <sc-for list=\"{{ reglaOptions }}\" as=\"o\" hint-placeholder-count=\"6\">\n                    <button type=\"button\" sc-camel-on-click=\"{{ o.onClick }}\" style=\"{{ o.style }}\">\n                      <span style=\"width:16px;flex:none;text-align:center\">{{ o.mark }}<\u002Fspan>\n                      <span style=\"flex:1\">{{ o.label }}<\u002Fspan>\n                      <span sc-camel-on-click=\"{{ o.onInfo }}\" style=\"{{ o.infoBtnStyle }}\" title=\"¿Qué es?\">?<\u002Fspan>\n                      <sc-if value=\"{{ o.showInfo }}\"><span style=\"{{ o.popStyle }}\">{{ o.def }}<\u002Fspan><\u002Fsc-if>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <!-- feedback -->\n                <sc-if value=\"{{ isRevealed }}\">\n                  <div style=\"margin-top:16px;padding:14px 16px;border-radius:16px;background:{{ fbBg }};border:1px solid {{ fbBorder }};animation:slideup .25s ease\">\n                    <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-bottom:8px\">\n                      <span style=\"font-size:13.5px;font-weight:700;color:{{ spellColor }}\">{{ spellMsg }}<\u002Fspan>\n                      <span style=\"font-size:13.5px;font-weight:700;color:{{ ruleColor }}\">{{ ruleMsg }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:14px;color:var(--color-neutral-800);line-height:1.5\">{{ ruleWhy }}<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-top:11px;padding-top:11px;border-top:1px solid {{ fbBorder }}\">\n                      <span style=\"font-size:20px\">{{ waterIcon }}<\u002Fspan>\n                      <div>\n                        <div style=\"font-size:14px;font-weight:800;color:{{ gainColor }}\">{{ gainMsg }}<\u002Fdiv>\n                        <div style=\"font-size:12.5px;color:var(--color-neutral-600)\">{{ gainSub }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- footer -->\n          <div style=\"padding:14px 20px;border-top:1px solid var(--color-divider);display:flex;align-items:center;gap:12px\">\n            <sc-if value=\"{{ isPlay }}\"><span style=\"font-size:12px;letter-spacing:.06em;color:var(--color-neutral-600);text-transform:uppercase\">Conversación · {{ stepNo }} / {{ stepTotal }}<\u002Fspan><\u002Fsc-if>\n            <button type=\"button\" class=\"btn btn-primary\" style=\"height:46px;margin-left:auto;padding-inline:22px\" sc-camel-on-click=\"{{ onPrimary }}\" disabled=\"{{ primaryDisabled }}\">{{ primaryLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== HUELLA DE CARBONO ===================== -->\n    <sc-if value=\"{{ showHuella }}\">\n      <div class=\"dialog-backdrop\" sc-camel-on-click=\"{{ closeHuella }}\" style=\"z-index:70\">\n        <div class=\"dialog\" style=\"width:min(580px,100%);max-height:88vh;overflow:auto\" sc-camel-on-click=\"{{ stop }}\">\n          <div class=\"dialog-title\">🌍 Huella de crear el juego: carbono y agua<\u002Fdiv>\n          <div class=\"dialog-body\" style=\"opacity:1\">\n            <p style=\"font-size:14px;color:var(--color-neutral-800);line-height:1.55;margin:0 0 14px\">\n              Estimación real del CO₂ que costó <strong>diseñar este juego<\u002Fstrong> (no el agua del juego, que es simbólica). Se basa en el trabajo hecho en este proyecto, con una intensidad de red de 400 g CO₂e/kWh y un PUE de centro de datos de 1,2.\n            <\u002Fp>\n\n            <div style=\"display:flex;align-items:baseline;gap:10px;padding:14px 16px;border-radius:16px;background:var(--color-accent-2-100);margin-bottom:14px\">\n              <div style=\"font-family:var(--font-heading);font-size:40px;color:var(--color-accent-2-800);line-height:1\">{{ co2Net }}<\u002Fdiv>\n              <div style=\"font-size:14px;color:var(--color-accent-2-800);font-weight:700\">g CO₂e (neto)<\u002Fdiv>\n              <div style=\"margin-left:auto;text-align:right;font-size:12.5px;color:var(--color-neutral-700);line-height:1.4\">≈ {{ co2Km }} km en coche<br>≈ {{ co2Phone }} cargas de móvil<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;align-items:baseline;gap:10px;padding:14px 16px;border-radius:16px;background:var(--color-accent-100);margin-bottom:16px\">\n              <div style=\"font-family:var(--font-heading);font-size:40px;color:var(--color-accent-700);line-height:1\">💧 {{ waterNet }}<\u002Fdiv>\n              <div style=\"font-size:14px;color:var(--color-accent-700);font-weight:700\">L de agua (neto)<\u002Fdiv>\n              <div style=\"margin-left:auto;text-align:right;font-size:12.5px;color:var(--color-neutral-700);line-height:1.4\">refrigeración del centro de datos<br>≈ {{ waterCups }} vasos de agua<\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"font-size:12.5px;color:var(--color-neutral-700);line-height:1.5;margin:-4px 0 14px\">\n              El <strong>agua<\u002Fstrong> es distinta del CO₂: los servidores se refrigeran con agua (~1,8 L/kWh). Con la misma energía de diseño → <strong>{{ waterNet }} L<\u002Fstrong>. Curiosamente, jugar bien \"ahorra\" en el juego mucha más agua simbólica de la que costó crearlo.\n            <\u002Fp>\n\n            <sc-for list=\"{{ co2Rows }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:baseline;gap:10px;padding:9px 0;border-bottom:1px solid var(--color-divider)\">\n                <div style=\"flex:1\">\n                  <div style=\"font-size:13.5px;font-weight:700;color:var(--color-text)\">{{ r.label }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:var(--color-neutral-600);line-height:1.4\">{{ r.detail }} · {{ r.wh }} Wh<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-family:var(--font-heading);font-size:16px;color:var(--color-accent-700);white-space:nowrap\">{{ r.g }} g<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"display:flex;align-items:baseline;gap:10px;padding:9px 0\">\n              <div style=\"flex:1\"><div style=\"font-size:13.5px;font-weight:700\">Tu equipo (portátil)<\u002Fdiv><div style=\"font-size:12px;color:var(--color-neutral-600)\">~35 W × 2 h de diseño y revisión · 70 Wh<\u002Fdiv><\u002Fdiv>\n              <div style=\"font-family:var(--font-heading);font-size:16px;color:var(--color-accent-700);white-space:nowrap\">{{ co2Device }} g<\u002Fdiv>\n            <\u002Fdiv>\n\n            <p style=\"font-size:12px;color:var(--color-neutral-600);line-height:1.5;margin:14px 0 0\">\n              Total ≈ {{ co2Net }} g CO₂e. Son estimaciones de orden de magnitud: el consumo exacto por consulta de IA no es público, así que se usan rangos razonables documentados.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div class=\"dialog-actions\"><button type=\"button\" class=\"btn btn-primary\" sc-camel-on-click=\"{{ closeHuella }}\">Entendido<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== REGLAS ===================== -->\n    <sc-if value=\"{{ showReglas }}\">\n      <div class=\"dialog-backdrop\" sc-camel-on-click=\"{{ closeReglas }}\" style=\"z-index:70\">\n        <div class=\"dialog\" style=\"width:min(560px,100%);max-height:86vh;overflow:auto\" sc-camel-on-click=\"{{ stop }}\">\n          <div class=\"dialog-title\">Reglas de acentuación<\u002Fdiv>\n          <div class=\"dialog-body\" style=\"opacity:1\">\n            <sc-for list=\"{{ reglaCards }}\" as=\"c\" hint-placeholder-count=\"6\">\n              <div style=\"padding:11px 0;border-bottom:1px solid var(--color-divider)\">\n                <div style=\"display:flex;align-items:baseline;gap:9px;margin-bottom:3px\">\n                  <span style=\"font-family:var(--font-heading);font-size:16px;color:var(--color-accent-700)\">{{ c.label }}<\u002Fspan>\n                  <span style=\"font-size:12.5px;color:var(--color-neutral-600)\">{{ c.pos }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:13.5px;color:var(--color-neutral-800);line-height:1.5\">{{ c.why }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:var(--color-accent-2-700);margin-top:3px;font-style:italic\">{{ c.ej }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div class=\"dialog-actions\"><button type=\"button\" class=\"btn btn-primary\" sc-camel-on-click=\"{{ closeReglas }}\">Entendido<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:980,&quot;height&quot;:640},&quot;metaGal&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:250,&quot;min&quot;:100,&quot;max&quot;:380,&quot;unit&quot;:&quot;gal&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Meta&quot;},&quot;metaAciertos&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:12,&quot;min&quot;:4,&quot;max&quot;:19,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Meta&quot;}}\">\nconst RULES = {\n  'aguda-con': { label:'Aguda con tilde', pos:'tónica: última sílaba', def:'Aguda: la sílaba fuerte es la ÚLTIMA (ca-mión, fa-rol).', why:'Palabra aguda (la sílaba fuerte es la última). Lleva tilde porque termina en vocal, -n o -s.', ej:'razón, compás, camión' },\n  'aguda-sin': { label:'Aguda sin tilde', pos:'tónica: última sílaba', def:'Aguda: la sílaba fuerte es la ÚLTIMA (na-riz, fa-rol).', why:'Palabra aguda (la sílaba fuerte es la última). No lleva tilde porque termina en consonante distinta de -n o -s.', ej:'na barrio con el ahorro?'},{who:'B',text:'Un gran @@: redujimos el consumo de agua a la mitad.'}] },\n  { w:'cortés',      g:'courteous',       loc:'super',  syl:['cor','tés'],           t:1, rule:'aguda-con', litros:10, dialog:[{who:'A',text:'¿Cómo os pidió reutilizar el agua de lluvia?'},{who:'B',text:'De forma muy @@, y todos aceptamos encantados.'}] },\n  { w:'egoísta',     g:'selfish',         loc:'super',  syl:['e','go','ís','ta'],    t:2, rule:'hiato',     litros:12, dialog:[{who:'A',text:'Dejas el grifo abierto mientras te cepillas...'},{who:'B',text:'Tienes razón, no debo ser @@ con el agua. Ya lo cierro.'}] },\n  { w:'tímido',      g:'shy',             loc:'tienda', syl:['tí','mi','do'],        t:0, rule:'esdrujula', litros:12, dialog:[{who:'A',text:'¿Por qué tu hermano cierra siempre el grifo?'},{who:'B',text:'Es @@, pero en casa nos recuerda cuidar cada gota de agua.'}] },\n  { w:'llamativo',   g:'showy, flashy',   loc:'tienda', syl:['lla','ma','ti','vo'],  t:2, rule:'llana-sin', litros:8,  dialog:[{who:'A',text:'¿Viste ese cartel del parque?'},{who:'B',text:'Sí, es muy @@ y explica cómo ahorrar agua en el jardín.'}] },\n  { w:'mandón',      g:'bossy',           loc:'tienda', syl:['man','dón'],           t:1, rule:'aguda-con', litros:15, dialog:[{who:'A',text:'¿Tu abuelo os deja regar al mediodía?'},{who:'B',text:'Qué va, es un poco @@: a esa hora el agua se evapora.'}] },\n  { w:'desilusión',  g:'disappointment',  loc:'jardin', syl:['de','si','lu','sión'], t:3, rule:'aguda-con', litros:25, dialog:[{who:'A',text:'¿Qué encontraste esta mañana?'},{who:'B',text:'Qué @@: el grifo goteó toda la noche y se perdió mucha agua.'}] },\n  { w:'raíces',      g:'roots',           loc:'jardin', syl:['ra','í','ces'],        t:1, rule:'hiato',     litros:14, dialog:[{who:'A',text:'¿Cuándo riegas las plantas?'},{who:'B',text:'Al amanecer, así las @@ aprovechan cada gota de agua.'}] },\n  { w:'niñez',       g:'childhood',       loc:'jardin', syl:['ni','ñez'],            t:1, rule:'aguda-sin', litros:16, dialog:[{who:'A',text:'¿Desde cuándo recoges el agua fría de la ducha?'},{who:'B',text:'Desde mi @@; me enseñaron a guardarla en un cubo.'}] },\n  { w:'comprensión', g:'understanding',   loc:'ucr',    syl:['com','pren','sión'],   t:2, rule:'aguda-con', litros:18, dialog:[{who:'A',text:'¿Aceptaron duchas más cortas en el campus?'},{who:'B',text:'Con un poco de @@, todos entendimos por qué ahorrar agua.'}] },\n];\n\nconst LOCATIONS = [\n  { id:'ucr',    name:'UC Riverside',   emoji:'🏛️', char:'Profesora · UCR',      cap:'CAP. 2 ·', x:46, y:52, scenario:'En la universidad, la profesora te pregunta cómo lograron que todos aceptaran duchas más cortas en el campus durante la sequía. Escribe la palabra con su tilde.' },\n  { id:'cocina', name:'Cocina',         emoji:'🍽️', char:'Mamá · en la cocina',  cap:'CAP. 4 ·', x:24, y:34, scenario:'En la cocina, tu mamá te enseña a reutilizar el agua de cocer las verduras y de la pasta para regar. Escribe cada palabra con su tilde.' },\n  { id:'super',  name:'Supermercado',   emoji:'🛒', char:'Cajero · amable',      cap:'CAP. 2 ·', x:70, y:32, scenario:'Haciendo la compra charlas de dos hábitos: cerrar el grifo al cepillarte y aprovechar el agua de lluvia. Elige bien las tildes.' },\n  { id:'bano',   name:'Baño',           emoji:'🚿', char:'Diego · tu hermanito', cap:'CAP. 1 ·', x:13, y:60, scenario:'Diego aprende a ducharse rápido y a cerrar la llave mientras se enjabona. Ayúdale a escribir bien y a no malgastar el agua.' },\n  { id:'cuarto', name:'Tu cuarto · IA', emoji:'💻', char:'Asistente · IA',       cap:'CAP. 4 ·', x:37, y:58, scenario:'Tu asistente te anima a acortar la ducha cuando estás estresado y a revisar las fugas cuando te sientes agobiado. Escribe cada palabra con su tilde.' },\n  { id:'tienda', name:'Tienda de ropa', emoji:'👕', char:'Dependienta',          cap:'CAP. 1 ·', x:85, y:58, scenario:'Mientras miras ropa, charláis de cómo tu familia cuida el agua en casa: quién cierra el grifo, quién no riega al mediodía. Elige bien las tildes.' },\n  { id:'patio',  name:'Entrada / patio',emoji:'🧹', char:'Doña Ana · vecina',    cap:'CAP. 2 ·', x:54, y:76, scenario:'En el patio, Doña Ana te cuenta el reto del barrio para gastar menos agua y el éxito que consiguieron. Acompáñala con buenas tildes.' },\n  { id:'jardin', name:'Jardín',         emoji:'🌻', char:'Jardinero · UCR',      cap:'CAP. 2 ·', x:82, y:80, scenario:'En el jardín se riega al amanecer, se arreglan las fugas y se aprovecha cada gota. Cuida las raíces… y las tildes.' },\n];\n\nconst ANIMALS = [\n  { emoji:'🦙', name:'Llama',    latin:'Lama glama',        note:'Domesticada en los Andes; resiste la sequía y aprovecha cada gota.' },\n  { emoji:'🦥', name:'Perezoso', latin:'Folivora',          note:'Lento y eficiente: gasta poquísima agua y energía.' },\n  { emoji:'🐨', name:'Koala',    latin:'Phascolarctos',     note:'Casi no bebe: saca el agua de las hojas que come.' },\n  { emoji:'🦎', name:'Camaleón', latin:'Chamaeleonidae',    note:'Recoge el rocío de la mañana para hidratarse.' },\n  { emoji:'🐢', name:'Tortuga',  latin:'Testudines',        note:'Guarda reservas de agua y vive muchísimos años.' },\n  { emoji:'🦉', name:'Búho',     latin:'Strigiformes',      note:'Vigila la ciudad de noche, cuando menos agua se evapora.' },\n  { emoji:'🐝', name:'Abeja',    latin:'Anthophila',        note:'Poliniza el jardín que tú ayudas a regar.' },\n  { emoji:'🦫', name:'Castor',   latin:'Castor',            note:'Ingeniero del agua: construye presas y la conserva.' },\n];\n\nconst VMAP = {'á':'a','é':'e','í':'i','ó':'o','ú':'u','ü':'u','Á':'A','É':'E','Í':'I','Ó':'O','Ú':'U'};\nconst strip = s => s.replace(/[áéíóúüÁÉÍÓÚ]/g, c => VMAP[c] || c);\nconst norm  = s => (s||'').trim().toLowerCase().replace(/[.,!¡¿?]/g,'');\nconst OK = '#5c7a4a', BAD = '#b4432e';\n\nconst DECOR = [ {x:6,y:80,e:1},{x:20,y:90,e:1},{x:63,y:88,e:1},{x:92,y:86,e:1},{x:58,y:42,e:1},{x:33,y:78,e:1} ];\n// burros que deambulan por la ciudad (posición %, duración y retardo de su paseo)\nconst DONKEY_POOL = [ {x:16,y:44,dur:15,delay:0},{x:64,y:24,dur:19,delay:2},{x:30,y:70,dur:17,delay:1},{x:76,y:68,dur:21,delay:3},{x:50,y:88,dur:16,delay:1.5} ];\nconst AVATAR_HOME = { left:'50%', top:'90%' };\n\n// ---- Huella de carbono real de CONSTRUIR este juego (estimación itemizada) ----\n// Supuestos públicos: intensidad de red 400 g CO₂e/kWh (media mundial); PUE del centro de datos 1,2.\nconst GRID_G_PER_KWH = 400, PUE = 1.2;\n// wh = energía estimada en el chip (Wh) para el trabajo realizado en ESTE proyecto.\nconst HUELLA_ITEMS = [\n  { label:'Análisis de imágenes', detail:'~22 capturas del juego original y de las revisiones', wh:26 },\n  { label:'Generación de código', detail:'3 versiones completas + ~25 ediciones del componente', wh:50 },\n  { label:'Razonamiento y diálogo', detail:'~30 turnos de conversación con la IA', wh:30 },\n  { label:'PDF, descompresión y renders', detail:'lectura de reglas, bundle y capturas de prueba', wh:18 },\n];\nconst DEVICE_WH = 70;   // tu portátil ~35 W × ~2 h de diseño y revisión\nconst REUSE_CREDIT_G = 22; // crédito por reciclar vocabulario, reglas y diálogos ya generados\nconst WUE_L_PER_KWH = 1.8;  // agua de refrigeración del centro de datos (litros por kWh, on-site)\nconst WATER_REUSE_CREDIT_L = 0.10; // crédito de agua por reciclar contenido\nfunction computeHuella(){\n  const rows = HUELLA_ITEMS.map(it => {\n    const g = (it.wh * PUE)/1000 * GRID_G_PER_KWH;\n    return { label:it.label, detail:it.detail, wh:it.wh, g:Math.round(g) };\n  });\n  const deviceG = Math.round(DEVICE_WH/1000 * GRID_G_PER_KWH);\n  const gross = rows.reduce((a,r)=>a+r.g,0) + deviceG;\n  const net = gross;\n  // --- agua de diseño (distinta del CO₂): refrigeración del centro de datos ---\n  const dcKwh = (HUELLA_ITEMS.reduce((a,it)=>a+it.wh,0) * PUE)/1000;\n  const waterGross = dcKwh * WUE_L_PER_KWH;      // litros\n  const waterNet = waterGross;\n  return { rows, deviceG, gross, net, reuse:REUSE_CREDIT_G,\n    kmCar:(net/120).toFixed(2),        // ~120 g CO₂e por km en coche de gasolina\n    phone:(net/8).toFixed(0),          // ~8 g por carga completa de móvil\n    waterGross:waterGross.toFixed(2), waterNet:waterNet.toFixed(2),\n    waterReuse:WATER_REUSE_CREDIT_L.toFixed(2), waterCups:(waterNet/0.25).toFixed(1) }; // ~0,25 L por vaso\n}\nconst HUELLA = computeHuella();\n\nclass Component extends DCLogic {\n  state = {\n    screen:'inicio', animal:0,\n    open:null, queue:[], qi:0, mphase:'scenario', input:'', picked:null, infoRule:null,\n    results:[], saved:0, spent:0, aciertos:0, errores:0, visited:{}, showReglas:false, showHuella:false,\n    avatarLeft:AVATAR_HOME.left, avatarTop:AVATAR_HOME.top,\n    showBackpack:false, backpack:{ barril:0, pala:0 }, putCerro:false, putTower:false, lastEvent:null, studentName:'',\n  };\n  componentWillUnmount(){ if(this.walkT) clearTimeout(this.walkT); }\n\n  onNameInput = e => this.setState({ studentName:e.target.value });\n\n  toggleBackpack = () => this.setState(s=>({ showBackpack:!s.showBackpack }));\n  towerClick = () => this.openLoc('ucr')();\n  apagarFuego = () => this.setState(s => {\n    if(s.backpack.barril<=0) return {};\n    const bp = {...s.backpack, barril:s.backpack.barril-1};\n    if(s.errores>=3 && !s.putCerro) return { backpack:bp, putCerro:true, lastEvent:'🪣 Apagaste el incendio del cerro.' };\n    if(s.errores>=6 && !s.putTower) return { backpack:bp, putTower:true, lastEvent:'🪣 Apagaste el fuego de la Bell Tower.' };\n    return {};\n  });\n\n  chooseAnimal = i => () => this.setState({ animal:i });\n  play = () => this.setState({ screen:'mapa' });\n  openReglas = () => this.setState({ showReglas:true });\n  closeReglas = () => this.setState({ showReglas:false });\n  openHuella = () => this.setState({ showHuella:true });\n  closeHuella = () => this.setState({ showHuella:false });\n  stop = e => { if(e&&e.stopPropagation) e.stopPropagation(); };\n\n  openLoc = id => () => {\n    const loc = LOCATIONS.find(l=>l.id===id);\n    const queue = WORDS.map((w,i)=>({w,i})).filter(x=>x.w.loc===id).map(x=>x.i);\n    // el avatar camina hasta el lugar; el modal se abre al llegar\n    this.setState({ avatarLeft: loc.x+'%', avatarTop: loc.y+'%' });\n    if(this.walkT) clearTimeout(this.walkT);\n    this.walkT = setTimeout(() => {\n      this.setState({ open:id, queue, qi:0, mphase:'scenario', input:'', picked:null, infoRule:null });\n    }, 720);\n  };\n  closeModal = () => {\n    const id = this.state.open;\n    this.setState(s => ({ open:null, visited:{...s.visited, [id]:true}, avatarLeft:AVATAR_HOME.left, avatarTop:AVATAR_HOME.top,\n      backpack:{...s.backpack, barril:s.backpack.barril+1}, lastEvent:'🎒 Conseguiste un 🪣 barril de agua al completar el lugar.' }));\n  };\n  scenarioGo = () => this.setState({ mphase:'play' });\n\n  onWordInput = e => this.setState({ input:e.target.value });\n  pick = k => () => { if(this.state.mphase==='play' && !this.isRevealed()) this.setState({ picked:k, infoRule:null }); };\n  infoToggle = k => e => { if(e&&e.stopPropagation) e.stopPropagation(); this.setState(s=>({ infoRule: s.infoRule===k?null:k })); };\n  isRevealed() { return this.state._revealed; }\n\n  canCheck() { return this.state.input.trim().length>0 && this.state.picked; }\n  check = () => {\n    if(this.state._revealed || !this.canCheck()) return;\n    const cur = WORDS[this.state.queue[this.state.qi]];\n    const spellOk = norm(this.state.input) === cur.w.toLowerCase();\n    const ruleOk = this.state.picked === cur.rule;\n    const both = spellOk && ruleOk;\n    this.setState(s => ({\n      _revealed:true,\n      results:[...s.results, {word:cur.w, rule:cur.rule, spellOk, ruleOk, both, litros:cur.litros}],\n      saved: both ? s.saved + cur.litros : s.saved,\n      spent: both ? s.spent : s.spent + cur.litros,\n      aciertos: both ? s.aciertos+1 : s.aciertos,\n      errores: both ? s.errores : s.errores+1,\n      lastEvent: both ? '🌿 ¡Nació un burro! (+'+cur.litros+' gal ahorrados)' : '💀 Un burro se marchó por el error… (−'+cur.litros+' gal)',\n    }));\n  };\n  nextInLoc = () => {\n    if(this.state.qi+1 >= this.state.queue.length) { this.setState({ _revealed:false }); this.closeModal(); return; }\n    this.setState(s => ({ qi:s.qi+1, input:'', picked:null, infoRule:null, _revealed:false }));\n  };\n  onPrimary = () => {\n    if(this.state.mphase==='scenario') return this.scenarioGo();\n    if(!this.state._revealed) return this.check();\n    return this.nextInLoc();\n  };\n  onKey = e => { if(e.key==='Enter'){ e.preventDefault(); if(this.state.mphase==='scenario') this.scenarioGo(); else if(!this.state._revealed){ if(this.canCheck()) this.check(); } else this.nextInLoc(); } };\n\n  reiniciar = () => this.setState({ open:null, results:[], saved:0, spent:0, aciertos:0, errores:0, visited:{}, _revealed:false, avatarLeft:AVATAR_HOME.left, avatarTop:AVATAR_HOME.top, backpack:{barril:0,pala:0}, putCerro:false, putTower:false, lastEvent:null, showBackpack:false });\n\n  cityState() {\n    const ans = this.state.aciertos + this.state.errores;\n    if(ans===0) return { label:'Floreciente', emoji:'🌳', color:'#8fbf6a', ground:'linear-gradient(180deg,#8ba36a,#6f8a4e)' };\n    const r = this.state.aciertos/ans;\n    if(r>=0.8) return { label:'Floreciente', emoji:'🌳', color:'#8fbf6a', ground:'linear-gradient(180deg,#8ba36a,#6f8a4e)' };\n    if(r>=0.55) return { label:'Estable', emoji:'🌿', color:'#b9c98a', ground:'linear-gradient(180deg,#9aa86f,#7f8a54)' };\n    if(r>=0.35) return { label:'Marchita', emoji:'🍂', color:'#e0b978', ground:'linear-gradient(180deg,#b7a066,#9c8248)' };\n    return { label:'Seca', emoji:'🏜️', color:'#e69a6a', ground:'linear-gradient(180deg,#c9a36a,#b07b45)' };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const A = ANIMALS[s.animal];\n    const city = this.cityState();\n    const metaGal = this.props.metaGal ?? 250;\n    const metaAciertos = this.props.metaAciertos ?? 12;\n    const metaDone = s.saved >= metaGal && s.aciertos >= metaAciertos;\n\n    const name = (s.studentName||'').trim();\n    const fecha = new Date().toLocaleString('es-ES', { dateStyle:'long', timeStyle:'short' });\n    const subject = `Crédito extra · Riverside en equilibrio — ${name || 'estudiante'}`;\n    const body =\n      `Hola profesora,\\n\\nRescaté Riverside y alcancé la meta de crédito extra.\\n\\n`+\n      `Nombre del estudiante: ${name}\\n`+\n      `Agua ahorrada: ${s.saved} gal\\n`+\n      `Agua gastada: ${s.spent} gal\\n`+\n      `Aciertos: ${s.aciertos}\\n`+\n      `Fecha y hora: ${fecha}\\n\\n`+\n      `Gracias.`;\n    const mailtoHref = `mailto:pcucu001@ucr.edu?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;\n    const sendReady = metaDone && name.length>0;\n\n    // salud de la ciudad (0..1) para teñir burros, torre y montañas\n    const ansTot = s.aciertos + s.errores;\n    const lush = ansTot===0 ? 0.7 : s.aciertos/ansTot;\n    const donkeyFilter = `grayscale(${((1-lush)*0.85).toFixed(2)}) brightness(${(0.82+lush*0.22).toFixed(2)})`;\n    const donkeyOpacity = (0.6 + lush*0.4).toFixed(2);\n    const towerFilter = `grayscale(${((1-lush)*0.6).toFixed(2)}) brightness(${(0.9+lush*0.15).toFixed(2)})`;\n    const skyBg = `linear-gradient(180deg, ${lush>0.6?'#bfe0ea':lush>0.35?'#d9d9c4':'#e8cbaa'}, ${lush>0.6?'#e7f0e0':'#efe3cf'})`;\n    const mtnFar = lush>0.6?'#8fa6a0':lush>0.35?'#a89f86':'#b99b78';\n    const mtnNear = lush>0.6?'#7c9a6f':lush>0.35?'#9a9668':'#b08a5c';\n    const crackOpacity = (Math.max(0,(1-lush)-0.35)*1.4).toFixed(2);\n\n    // burros: nacen al acertar, mueren al errar (población dependiente del marcador)\n    const burroCount = Math.max(0, Math.min(9, 3 + s.aciertos - s.errores));\n    const lastBorn = /Nació/.test(s.lastEvent||'');\n    const burros = Array.from({length:burroCount}).map((_,i) => {\n      const p = DONKEY_POOL[i % DONKEY_POOL.length];\n      const born = lastBorn && i===burroCount-1;\n      return { left:p.x+'%', top:p.y+'%', dur:p.dur, delay:p.delay,\n        anim: born ? 'bornpop .5s ease' : 'graze 2.6s ease-in-out infinite' };\n    });\n    const deadBurro = s.errores>=5 && burroCount===0;\n\n    // incendios por errores acumulados (como el otro juego)\n    const cerroFire = s.errores>=3 && !s.putCerro;\n    const towerFire = s.errores>=6 && !s.putTower;\n    const anyFire = cerroFire || towerFire;\n    const fireMsg = towerFire && !cerroFire ? '¡Fuego en la Bell Tower!' : (towerFire ? '¡Incendios en el cerro y la torre!' : '¡Incendio en el cerro!');\n    const barrilCount = s.backpack.barril;\n\n    // mochila\n    const ITEMS = { barril:{emoji:'🪣',name:'Barril de agua',desc:'Apaga un incendio.'}, pala:{emoji:'🪏',name:'Pala',desc:'Sofoca fuegos y entierra burros.'} };\n    const bagItems = Object.keys(s.backpack).filter(k=>s.backpack[k]>0).map(k=>({ emoji:ITEMS[k].emoji, name:ITEMS[k].name, desc:ITEMS[k].desc, count:s.backpack[k] }));\n    const backpackCount = Object.values(s.backpack).reduce((a,b)=>a+b,0);\n\n    // inicio animal picker\n    const animalChoices = ANIMALS.map((a,i) => ({\n      emoji:a.emoji, onClick:this.chooseAnimal(i),\n      style:`width:54px;height:54px;border-radius:16px;font-size:28px;cursor:pointer;display:grid;place-items:center;background:${i===s.animal?'var(--color-accent-2-100)':'var(--color-surface)'};border:2px solid ${i===s.animal?'var(--color-accent-2)':'var(--color-divider)'};`,\n    }));\n\n    // map locations (la Bell Tower cubre 'ucr'/biblioteca, se pinta aparte)\n    const locList = LOCATIONS.filter(l=>l.id!=='ucr').map(l => ({\n      name:l.name, emoji:l.emoji, done:!!s.visited[l.id], onClick:this.openLoc(l.id),\n      style:`position:absolute;left:${l.x}%;top:${l.y}%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:0;`,\n      iconStyle:'position:relative;width:56px;height:56px;border-radius:18px;background:rgba(255,255,255,.92);box-shadow:var(--shadow-md);display:grid;place-items:center;font-size:28px;',\n    }));\n    const decor = DECOR.map(d => ({\n      emoji: city.label==='Seca' ? '🥀' : (city.label==='Marchita' ? '🍂' : '🌳'),\n      style:`position:absolute;left:${d.x}%;top:${d.y}%;transform:translate(-50%,-50%);font-size:26px;opacity:.9`,\n    }));\n\n    // modal\n    const loc = LOCATIONS.find(l=>l.id===s.open) || null;\n    const cur = s.open ? WORDS[s.queue[s.qi]] : null;\n    const revealed = s._revealed;\n    const isPlay = s.mphase==='play';\n\n    let dialogLines = [], silabas = [], reglaOptions = [];\n    const fb = {};\n    if(cur){\n      const tokenTxt = revealed ? cur.w : strip(cur.w);\n      const tokStyle = revealed ? 'color:var(--color-accent-700);font-weight:800;' : 'color:var(--color-accent);font-weight:700;border-bottom:2px dotted var(--color-accent);padding:0 1px;';\n      dialogLines = cur.dialog.map(ln => {\n        const whoColor = ln.who==='A' ? 'var(--color-accent)' : 'var(--color-accent-2)';\n        let pre = ln.text, post = '', hasToken=false;\n        const i = ln.text.indexOf('@@');\n        if(i>=0){ pre = ln.text.slice(0,i); post = ln.text.slice(i+2); hasToken=true; }\n        return {\n          who:ln.who, hasToken, pre, post, token:tokenTxt, tokenStyle:tokStyle,\n          rowStyle:'display:flex;gap:10px;align-items:flex-start;',\n          whoStyle:`flex:none;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-family:var(--font-heading);font-size:13px;color:#fff;background:${whoColor};margin-top:1px;`,\n          bubbleStyle:'background:var(--color-neutral-100);border-radius:14px;padding:9px 13px;font-size:15px;line-height:1.5;color:var(--color-text);flex:1;',\n        };\n      });\n      silabas = cur.syl.map((txt,i) => ({\n        text:txt,\n        style: i===cur.t\n          ? 'font-family:var(--font-heading);font-size:clamp(28px,7vw,42px);line-height:1;padding:2px 5px;color:var(--color-accent);border-bottom:3px solid var(--color-accent);'\n          : 'font-family:var(--font-heading);font-size:clamp(28px,7vw,42px);line-height:1;padding:2px 5px;color:var(--color-neutral-400);',\n      }));\n\n      const optBase = 'position:relative;display:flex;align-items:center;gap:7px;padding:11px 12px;border-radius:14px;font-size:13px;font-weight:600;text-align:left;font-family:var(--font-body);transition:all .12s;';\n      const infoBtnStyle = 'flex:none;width:19px;height:19px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;background:var(--color-neutral-200);color:var(--color-neutral-700);cursor:pointer;';\n      const popStyle = 'position:absolute;bottom:calc(100% + 8px);left:0;right:0;z-index:20;background:var(--color-neutral-900);color:var(--color-neutral-100);font-size:12px;font-weight:500;line-height:1.45;padding:9px 11px;border-radius:12px;box-shadow:var(--shadow-md);text-align:left;';\n      reglaOptions = ORDER.map(k => {\n        let style, mark='';\n        if(!revealed){\n          const sel = s.picked===k;\n          style = optBase + `cursor:pointer;border:2px solid ${sel?'var(--color-accent)':'var(--color-divider)'};background:${sel?'var(--color-accent-100)':'var(--color-surface)'};color:var(--color-text);`;\n        } else {\n          if(k===cur.rule){ style = optBase+`cursor:default;border:2px solid ${OK};background:var(--color-accent-2-100);color:var(--color-accent-2-800);`; mark='✓'; }\n          else if(k===s.picked){ style = optBase+`cursor:default;border:2px solid ${BAD};background:#f7e2db;color:#7a2a1e;`; mark='✗'; }\n          else { style = optBase+`cursor:default;border:2px solid var(--color-divider);background:var(--color-surface);color:var(--color-text);opacity:.45;`; }\n        }\n        return { key:k, label:RULES[k].label, mark, style, onClick:this.pick(k), def:RULES[k].def, onInfo:this.infoToggle(k), showInfo:s.infoRule===k, infoBtnStyle, popStyle };\n      });\n\n      if(revealed){\n        const last = s.results[s.results.length-1];\n        fb.spellMsg = last.spellOk ? '✓ Escritura correcta' : `✗ Se escribe: ${cur.w}`;\n        fb.spellColor = last.spellOk ? OK : BAD;\n        fb.ruleMsg = last.ruleOk ? '✓ Regla correcta' : `✗ Regla: ${RULES[cur.rule].label}`;\n        fb.ruleColor = last.ruleOk ? OK : BAD;\n        fb.ruleWhy = RULES[cur.rule].why;\n        fb.fbBg = last.both ? 'var(--color-accent-2-100)' : 'var(--color-accent-100)';\n        fb.fbBorder = last.both ? 'color-mix(in srgb,'+OK+' 45%,transparent)' : 'var(--color-divider)';\n        fb.waterIcon = last.both ? '💧' : '🏜️';\n        fb.gainColor = last.both ? 'var(--color-accent-2-800)' : 'var(--color-accent-700)';\n        fb.gainMsg = last.both ? `+${cur.litros} gal ahorrados · +1 acierto` : `−${cur.litros} gal gastados`;\n        fb.gainSub = last.both ? 'La ciudad reverdece.' : 'La ciudad se seca un poco. Vuelve a intentarlo en otro lugar.';\n      }\n    }\n\n    return {\n      isInicio:s.screen==='inicio', isMapa:s.screen==='mapa',\n      animalChoices, animalEmoji:A.emoji, animalName:A.name, animalLatin:A.latin, animalNote:A.note,\n      play:this.play, metaGal, metaAciertos, openReglas:this.openReglas,\n      saved:s.saved, spent:s.spent, aciertos:s.aciertos,\n      savedLeft:Math.max(0,metaGal-s.saved), aciertosLeft:Math.max(0,metaAciertos-s.aciertos),\n      cityEmoji:city.emoji, cityLabel:city.label, cityColor:city.color, groundBg:city.ground,\n      reiniciar:this.reiniciar, locList, decor, metaDone,\n      studentName:s.studentName, onNameInput:this.onNameInput, mailtoHref,\n      sendStyle: sendReady ? '' : 'opacity:.5;pointer-events:none;',\n      onSendClick: e => { if(!sendReady && e){ e.preventDefault(); } },\n      burros, donkeyFilter, donkeyOpacity, towerFilter, deadBurro,\n      skyBg, mtnFar, mtnNear, crackOpacity,\n      cerroFire, towerFire, anyFire, fireMsg, barrilCount, noBarril:s.backpack.barril<=0,\n      apagarFuego:this.apagarFuego, towerClick:this.towerClick, ucrDone:!!s.visited['ucr'],\n      showBackpack:s.showBackpack, toggleBackpack:this.toggleBackpack, bagItems, backpackCount, backpackEmpty:backpackCount===0,\n      statusMsg: s.lastEvent || ('Toca un lugar y '+A.name+' caminará hasta allí. Acierta para que nazcan burros 🫏; falla y se secará la ciudad.'),\n      avatarLeft:s.avatarLeft, avatarTop:s.avatarTop,\n      open:!!s.open, closeModal:this.closeModal, stop:this.stop,\n      locName:loc?loc.name:'', locChar:loc?loc.char:'', locCap:loc?loc.cap:'', locScenario:loc?loc.scenario:'',\n      isScenario:s.mphase==='scenario', isPlay,\n      dialogLines, silabas, reglaOptions, isRevealed:revealed,\n      currentInput:s.input, onWordInput:this.onWordInput, onKey:this.onKey,\n      stepNo:s.qi+1, stepTotal:s.queue.length,\n      primaryLabel: s.mphase==='scenario' ? 'Entrar →' : (revealed ? (s.qi+1>=s.queue.length ? 'Salir del lugar' : 'Siguiente →') : 'Comprobar'),\n      primaryDisabled: (s.mphase==='play' && !revealed) ? !this.canCheck() : false,\n      onPrimary:this.onPrimary,\n      ...fb,\n      showReglas:s.showReglas, closeReglas:this.closeReglas, reglaCards: ORDER.map(k=>({ label:RULES[k].label, pos:RULES[k].pos, why:RULES[k].why, ej:'ej.: '+RULES[k].ej })),\n      openHuella:this.openHuella, closeHuella:this.closeHuella, showHuella:s.showHuella,\n      co2Net:HUELLA.net, co2Gross:HUELLA.gross, co2Reuse:HUELLA.reuse, co2Device:HUELLA.deviceG,\n      co2Rows:HUELLA.rows, co2Km:HUELLA.kmCar, co2Phone:HUELLA.phone,\n      waterNet:HUELLA.waterNet, waterGross:HUELLA.waterGross, waterReuse:HUELLA.waterReuse, waterCups:HUELLA.waterCups,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
